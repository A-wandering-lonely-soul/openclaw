services:
  openclaw:
    build: .
    container_name: openclaw_service
    environment:
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-}
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      - OLLAMA_TIMEOUT_SECONDS=${OLLAMA_TIMEOUT_SECONDS:-90}
      - OLLAMA_MAX_TOKENS=${OLLAMA_MAX_TOKENS:-256}
      - OLLAMA_TEMPERATURE=${OLLAMA_TEMPERATURE:-0.2}
      - OLLAMA_SEARCH_ENABLED=${OLLAMA_SEARCH_ENABLED:-1}
      - OLLAMA_SEARCH_MAX_RESULTS=${OLLAMA_SEARCH_MAX_RESULTS:-1}
      - OLLAMA_SEARCH_SNIPPET_MAX_CHARS=${OLLAMA_SEARCH_SNIPPET_MAX_CHARS:-220}
      - OLLAMA_SEARCH_TOTAL_MAX_CHARS=${OLLAMA_SEARCH_TOTAL_MAX_CHARS:-360}
      - OLLAMA_SEARCH_PROMPT_MAX_CHARS=${OLLAMA_SEARCH_PROMPT_MAX_CHARS:-180}
      - OLLAMA_SEARCH_HISTORY_MAX_CHARS=${OLLAMA_SEARCH_HISTORY_MAX_CHARS:-1200}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379/0}
      - REDIS_CHAT_TTL_SECONDS=${REDIS_CHAT_TTL_SECONDS:-604800}
      - POSTGRES_DSN=${POSTGRES_DSN:-postgresql://openclaw:openclaw@postgres:5432/openclaw}
      - TAVILY_API_KEY=${TAVILY_API_KEY:-}
      - TUSHARE_TOKEN=${TUSHARE_TOKEN:-}
      - OPENAI_PROVIDER=${OPENAI_PROVIDER:-copilot}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4.1}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - openclaw_workspace:/app/workspace
    restart: always
    networks:
      - claw_net
    depends_on:
      - redis
      - postgres

  redis:
    image: redis:7-alpine
    container_name: openclaw_redis
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - openclaw_redis_data:/data
    restart: always
    networks:
      - claw_net

  postgres:
    image: postgres:16-alpine
    container_name: openclaw_postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-openclaw}
      - POSTGRES_USER=${POSTGRES_USER:-openclaw}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-openclaw}
    volumes:
      - openclaw_postgres_data:/var/lib/postgresql/data
    restart: always
    networks:
      - claw_net

  telegram_bot:
    build: ./telegram_bot
    container_name: telegram_bot
    profiles:
      - telegram
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN:-}
      - OPENCLAW_URL=http://openclaw:8000
    depends_on:
      - openclaw
    restart: always
    networks:
      - claw_net

  caddy:
    image: caddy:2-alpine
    container_name: caddy
    ports:
      - "${CADDY_HTTP_BIND:-0.0.0.0}:${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_BIND:-0.0.0.0}:${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      - DOMAIN=${DOMAIN:-}
    depends_on:
      - openclaw
    restart: always
    networks:
      - claw_net

  feishu_bot:
    build: ./feishu_bot
    container_name: feishu_bot
    profiles:
      - feishu
    environment:
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_VERIFICATION_TOKEN=${FEISHU_VERIFICATION_TOKEN:-}
      - FEISHU_ENCRYPT_KEY=${FEISHU_ENCRYPT_KEY:-}
      - OPENCLAW_URL=http://openclaw:8000
    depends_on:
      - openclaw
    restart: always
    networks:
      - claw_net

volumes:
  caddy_data:
  caddy_config:
  openclaw_workspace:
  openclaw_redis_data:
  openclaw_postgres_data:

networks:
  claw_net: